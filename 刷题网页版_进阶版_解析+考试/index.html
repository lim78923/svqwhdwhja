<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>驾考刷题系统</title>

<style>
body{font-family:Arial;padding:20px;max-width:700px;margin:auto;}
button{margin:5px;padding:10px;width:100%;}
.card{border:1px solid #ddd;padding:15px;border-radius:10px;}
.correct{background:#d4edda;}
.wrong{background:#f8d7da;}
.selected{background:#cce5ff;}
.topbar button{width:auto;padding:8px 12px;}
</style>
</head>

<body>

<h2>🚗 驾考刷题系统</h2>

<div class="topbar">
<button onclick="startPractice()">顺序练习</button>
<button onclick="startExam()">模拟考试</button>
<button onclick="startWrong()">错题练习</button>
<button onclick="showFavorites()">⭐ 收藏</button>
</div>

<div id="app" style="display:none;">
<div class="card">

<h3 id="progress"></h3>
<p id="question"></p>
<div id="options"></div>

<p id="explanation" style="display:none;"></p>

<button onclick="toggleFavorite()">⭐ 收藏本题</button>
<button id="nextBtn" onclick="next()">提交答案</button>

</div>
</div>

<div id="result" style="display:none;">
<h2>考试完成</h2>
<p id="score"></p>
<button onclick="location.reload()">返回首页</button>
</div>

<div id="listPage" style="display:none;">
<h2 id="listTitle"></h2>
<div id="listContent"></div>
<button onclick="location.reload()">返回首页</button>
</div>

<script src="questions.js"></script>
<script>

let list=[], index=0, score=0;
let selected="", checked=false;

// ===== 开始模式 =====
function startPractice(){
 list=[...questions];
 start();
}

function startExam(){
 list=[...questions].sort(()=>Math.random()-0.5).slice(0,50);
 start();
}

function startWrong(){
 let wrong=JSON.parse(localStorage.getItem("wrongList")||"[]");
 if(wrong.length===0){
   alert("暂无错题");
   return;
 }
 list=wrong;
 start();
}

// ===== 初始化 =====
function start(){
 document.getElementById("app").style.display="block";
 document.getElementById("result").style.display="none";
 document.getElementById("listPage").style.display="none";

 index=0;
 score=0;

 render();
}

// ===== 渲染 =====
function render(){
 let q=list[index];

 selected="";
 checked=false;

 document.getElementById("progress").innerText=`第 ${index+1} 题 / 共 ${list.length} 题`;
 document.getElementById("question").innerText=q.question;

 let exp=document.getElementById("explanation");
 exp.style.display="none";
 exp.innerText="";

 document.getElementById("nextBtn").innerText="提交答案";

 let div=document.getElementById("options");
 div.innerHTML="";

 ["A","B","C","D"].forEach(o=>{
   let b=document.createElement("button");
   b.innerText=o+". "+(q.options[o]||"");

   b.onclick=()=>{
     if(checked) return;

     selected=o;

     document.querySelectorAll("#options button").forEach(btn=>{
       btn.classList.remove("selected");
     });

     b.classList.add("selected");
   };

   div.appendChild(b);
 });
}

// ===== 提交答案 =====
function next(){

 if(!selected){
   alert("请选择答案");
   return;
 }

 let q=list[index];

 if(!checked){
   checked=true;

   let buttons=document.querySelectorAll("#options button");

   buttons.forEach(b=>{
     if(b.innerText.startsWith(q.answer)){
       b.classList.add("correct");
     }
     if(b.innerText.startsWith(selected) && selected!==q.answer){
       b.classList.add("wrong");
     }
   });

   if(selected === q.answer){
     score++;
   } else {
     let wrongList = JSON.parse(localStorage.getItem("wrongList")||"[]");

     if(!wrongList.some(item=>item.question===q.question)){
       wrongList.push(q);
       localStorage.setItem("wrongList", JSON.stringify(wrongList));
     }
   }

   let exp=document.getElementById("explanation");
   exp.innerText = `正确答案：${q.answer}\n解析：${q.explanation||"暂无解析"}`;
   exp.style.display="block";

   document.getElementById("nextBtn").innerText="下一题";
   return;
 }

 index++;

 if(index>=list.length){
   showResult();
   return;
 }

 render();
}

// ===== 成绩 =====
function showResult(){
 document.getElementById("app").style.display="none";
 document.getElementById("result").style.display="block";

 document.getElementById("score").innerText =
   "得分："+score+" / "+list.length;
}

// ===== 收藏 =====
function toggleFavorite(){
 let q=list[index];
 let fav=JSON.parse(localStorage.getItem("favList")||"[]");

 if(fav.some(item=>item.question===q.question)){
   alert("已收藏");
   return;
 }

 fav.push(q);
 localStorage.setItem("favList", JSON.stringify(fav));
 alert("收藏成功 ⭐");
}

function showFavorites(){
 let fav=JSON.parse(localStorage.getItem("favList")||"[]");
 showList("收藏题目", fav);
}

// ===== 通用列表页 =====
function showList(title, arr){
 document.getElementById("app").style.display="none";
 document.getElementById("listPage").style.display="block";

 document.getElementById("listTitle").innerText=title;

 let box=document.getElementById("listContent");
 box.innerHTML="";

 if(arr.length===0){
   box.innerHTML="<p>暂无内容</p>";
   return;
 }

 arr.forEach((q,i)=>{
   let div=document.createElement("div");
   div.style.border="1px solid #ddd";
   div.style.margin="10px";
   div.style.padding="10px";

   div.innerHTML=`
     <p>${i+1}. ${q.question}</p>
     <p>答案：${q.answer}</p>
     <p>解析：${q.explanation||"暂无解析"}</p>
   `;

   box.appendChild(div);
 });
}

</script>

</body>
</html>
