<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题系统Pro</title>
<style>
body{font-family:Arial;padding:20px;max-width:700px;margin:auto;}
button{margin:5px;padding:10px;width:100%;}
.card{border:1px solid #ddd;padding:15px;border-radius:10px;}
.correct{background:#d4edda;}
.wrong{background:#f8d7da;}
.selected{background:#cce5ff;}
</style>
</head>
<body>

<h2>刷题系统 Pro</h2>

<div>
<button onclick="startPractice()">顺序刷题</button>
<button onclick="startExam()">模拟考试（随机50题）</button>
</div>

<div id="app" style="display:none;">
<div class="card">
<h3 id="progress"></h3>
<p id="question"></p>
<div id="options"></div>

<!-- ✅ 初始隐藏 -->
<p id="explanation" style="display:none;"></p>

<button id="nextBtn" onclick="next()">提交答案</button>
</div>
</div>

<div id="result" style="display:none;">
<h2>考试完成</h2>
<p id="score"></p>
<button onclick="location.reload()">返回首页</button>
</div>

<div id="wrongBox" style="display:none;">
<h2>错题本</h2>
<div id="wrongList"></div>
<button onclick="clearWrong()">清空错题本</button>
<button onclick="location.reload()">返回首页</button>
</div>

<script src="questions.js"></script>
<script>

// ================= 状态变量 =================
let list=[], index=0, score=0;
let selected="";     // 当前选择
let checked=false;   // 是否已判题

// ================= 开始 =================
function startPractice(){
 list=[...questions];
 start();
}

function startExam(){
 list=[...questions].sort(()=>Math.random()-0.5).slice(0,50);
 start();
}

function start(){
 document.getElementById("app").style.display="block";
 document.getElementById("result").style.display="none";
 document.getElementById("wrongBox").style.display="none";

 index=0;
 score=0;

 render();
}

// ================= 渲染题目 =================
function render(){
 let q=list[index];

 selected="";
 checked=false;

 document.getElementById("progress").innerText=`第 ${index+1} 题 / 共 ${list.length} 题`;
 document.getElementById("question").innerText=q.question;

 // ❌ 初始不显示答案解析
 let exp=document.getElementById("explanation");
 exp.style.display="none";
 exp.innerText="";

 document.getElementById("nextBtn").innerText="提交答案";

 let div=document.getElementById("options");
 div.innerHTML="";

 ["A","B","C","D"].forEach(o=>{
   let b=document.createElement("button");
   b.innerText=o+". "+(q.options[o]||"");

   // ✅ 点击只选中，不显示答案
   b.onclick=()=>{
     if(checked) return;

     selected=o;

     document.querySelectorAll("#options button").forEach(btn=>{
       btn.classList.remove("selected");
     });

     b.classList.add("selected");
   };

   div.appendChild(b);
 });
}

// ================= 提交/下一题 =================
function next(){

 if(!selected){
   alert("请选择答案");
   return;
 }

 let q=list[index];

 // ===== 第一次点击：显示答案 =====
 if(!checked){
   checked=true;

   let buttons=document.querySelectorAll("#options button");

   buttons.forEach(b=>{
     if(b.innerText.startsWith(q.answer)){
       b.classList.add("correct");
     }
     if(b.innerText.startsWith(selected) && selected!==q.answer){
       b.classList.add("wrong");
     }
   });

   // 判分 + 错题记录
   if(selected === q.answer){
     score++;
   } else {
     let wrongList = JSON.parse(localStorage.getItem("wrongList")||"[]");

     if(!wrongList.some(item=>item.question===q.question)){
       wrongList.push(q);
       localStorage.setItem("wrongList", JSON.stringify(wrongList));
     }
   }

   // ✅ 这里才显示答案和解析
   let exp=document.getElementById("explanation");
   exp.innerText = `正确答案：${q.answer}\n解析：${q.explanation||"暂无解析"}`;
   exp.style.display="block";

   document.getElementById("nextBtn").innerText="下一题";

   return;
 }

 // ===== 第二次点击：下一题 =====
 index++;

 if(index>=list.length){
   showResult();
   return;
 }

 render();
}

// ================= 成绩 =================
function showResult(){
 document.getElementById("app").style.display="none";
 document.getElementById("result").style.display="block";

 document.getElementById("score").innerText =
   "得分："+score+" / "+list.length;

 // 防重复按钮
 let oldBtn=document.getElementById("wrongBtn");
 if(oldBtn) oldBtn.remove();

 let btn=document.createElement("button");
 btn.id="wrongBtn";
 btn.innerText="查看错题本";
 btn.onclick=showWrong;

 document.getElementById("result").appendChild(btn);
}

// ================= 错题本 =================
function showWrong(){
 document.getElementById("result").style.display="none";
 document.getElementById("wrongBox").style.display="block";

 let wrongList = JSON.parse(localStorage.getItem("wrongList")||"[]");
 let box=document.getElementById("wrongList");

 box.innerHTML="";

 if(wrongList.length===0){
   box.innerHTML="<p>暂无错题 👍</p>";
   return;
 }

 wrongList.forEach((q,i)=>{
   let div=document.createElement("div");
   div.style.border="1px solid #ddd";
   div.style.margin="10px";
   div.style.padding="10px";

   div.innerHTML=`
     <p>${i+1}. ${q.question}</p>
     <p>正确答案：${q.answer}</p>
     <p>解析：${q.explanation||"暂无解析"}</p>
   `;

   box.appendChild(div);
 });
}

// ================= 清空错题 =================
function clearWrong(){
 localStorage.removeItem("wrongList");
 alert("已清空错题本");
 location.reload();
}

</script>

</body>
</html>
